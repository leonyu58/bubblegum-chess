<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bubblegum Chess ♡ - Cute Pink Edition</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Bubblegum Chess ♡</h1>
    <div id="status">White's turn! ♔ Make your move cutie~</div>
    
<div id="board">
  <div id="overlay" class="overlay">
    <h2 id="gameOverTitle">CHECKMATE!</h2>
    <p id="gameOverMsg">Press "♡ New Game 💕" to play again!</p>
  </div>
</div>

    <div class="info">
      <p>Drag pieces or click to select + click to move 💕</p>
      <p>Two-player local: take turns on the same screen!</p>
    </div>
  </div>
<div class="controls">
  <button id="resetBtn">♡ New Game 💕</button>
</div>
  <script src="script.js"></script>
</body>
</html>
